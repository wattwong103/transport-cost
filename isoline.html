<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMK Airport Isoline Map - Bangkok Transport Cost</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .isoline-controls {
      position: absolute;
      bottom: 24px;
      left: 24px;
      right: 24px;
      z-index: 1000;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      padding: 16px;
      max-width: 900px;
      margin: 0 auto;
    }
    .isoline-controls h3 {
      font-size: 0.9rem;
      margin-bottom: 8px;
      color: #1a237e;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .control-row:last-child { margin-bottom: 0; }
    .control-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #555;
      min-width: 50px;
    }
    .mode-btn {
      padding: 5px 12px;
      border: 2px solid #ddd;
      border-radius: 16px;
      font-size: 0.75rem;
      cursor: pointer;
      background: white;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .mode-btn.active {
      color: white;
      border-color: var(--btn-color);
      background: var(--btn-color);
    }
    .mode-btn:hover { transform: translateY(-1px); }
    .view-toggle {
      display: flex;
      border: 2px solid #1a237e;
      border-radius: 8px;
      overflow: hidden;
    }
    .view-toggle button {
      padding: 6px 16px;
      border: none;
      background: white;
      color: #1a237e;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }
    .view-toggle button.active {
      background: #1a237e;
      color: white;
    }
    .legend-bar {
      display: flex;
      gap: 2px;
      align-items: center;
      margin-top: 8px;
    }
    .legend-swatch {
      height: 16px;
      flex: 1;
      border-radius: 2px;
    }
    .legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: #666;
      margin-top: 2px;
    }
    .isoline-map-panel {
      position: relative;
      height: calc(100vh - 52px);
    }
    #isoline-map {
      width: 100%;
      height: 100%;
    }
    @media (max-width: 768px) {
      .isoline-controls { bottom: 8px; left: 8px; right: 8px; padding: 12px; }
      .mode-btn { font-size: 0.65rem; padding: 4px 8px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div>
      <h1>Bangkok Transport Cost Comparison</h1>
      <div class="subtitle">DMK Airport - Reachability by transport mode</div>
    </div>
    <nav class="header-nav">
      <a href="index.html" class="nav-link">Cost Comparison</a>
      <a href="isoline.html" class="nav-link active">DMK Isoline</a>
    </nav>
  </header>

  <div class="isoline-map-panel">
    <div id="isoline-map"></div>
    <div id="isoline-loading" class="loading-overlay">Loading transport data...</div>

    <div class="isoline-controls">
      <div class="control-row">
        <span class="control-label">View</span>
        <div class="view-toggle">
          <button id="viewCost" class="active" data-view="cost">Cost (THB)</button>
          <button id="viewTime" data-view="time">Time (min)</button>
        </div>
      </div>
      <div class="control-row">
        <span class="control-label">Mode</span>
        <div id="modeButtons"></div>
      </div>
      <div>
        <div class="legend-bar" id="legendBar"></div>
        <div class="legend-labels" id="legendLabels"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/isoline.js"></script>
</body>
</html>
